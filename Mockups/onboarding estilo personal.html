<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "sand-bg": "#F9F9F7",
                        "surface-bright": "#fbf9f9",
                        "ink-black": "#121212",
                        "on-primary-fixed-variant": "#474746",
                        "secondary": "#a43c12",
                        "background": "#fbf9f9",
                        "on-secondary-container": "#6b1f00",
                        "secondary-fixed-dim": "#ffb59c",
                        "inverse-surface": "#303031",
                        "surface-dim": "#dbdad9",
                        "surface-container-high": "#e9e8e7",
                        "on-secondary-fixed": "#380c00",
                        "surface-container": "#efeded",
                        "coral-muted": "#E9967A",
                        "on-surface-variant": "#444748",
                        "outline-variant": "#c4c7c7",
                        "on-error": "#ffffff",
                        "on-primary-container": "#858383",
                        "surface-variant": "#e4e2e2",
                        "surface-tint": "#5f5e5e",
                        "coral-vibrant": "#FF7F50",
                        "on-error-container": "#93000a",
                        "surface": "#fbf9f9",
                        "surface-container-low": "#f5f3f3",
                        "on-tertiary-fixed-variant": "#454744",
                        "on-tertiary-container": "#838480",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1c1c",
                        "primary-fixed-dim": "#c8c6c5",
                        "secondary-container": "#fe7e4f",
                        "on-primary-fixed": "#1c1b1b",
                        "on-tertiary-fixed": "#1a1c19",
                        "tertiary-container": "#1a1c19",
                        "inverse-on-surface": "#f2f0f0",
                        "on-surface": "#1b1c1c",
                        "outline": "#747878",
                        "tertiary-fixed-dim": "#c6c7c2",
                        "primary": "#000000",
                        "tertiary-fixed": "#e3e3de",
                        "secondary-fixed": "#ffdbcf",
                        "on-secondary-fixed-variant": "#822800",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e5e2e1",
                        "surface-container-highest": "#e4e2e2",
                        "primary-container": "#1c1b1b",
                        "tertiary": "#000000",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#c8c6c5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "gutter": "24px",
                        "section-gap": "80px",
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "price-tag": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "price-tag": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "42px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .option-button.active {
            border-width: 2px;
            border-color: #121212;
            background-color: #efeded;
        }
        .progress-glow {
            box-shadow: 0 0 8px rgba(255, 127, 80, 0.4);
        }
    </style>
</head>
<body class="bg-sand-bg text-ink-black min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Progress Bar (Top Anchor) -->
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container-high z-[60]">
<div class="h-full bg-coral-vibrant transition-all duration-700 ease-out progress-glow" style="width: 20%;"></div>
</div>
<!-- Onboarding Shell Suppression: No NavBars for focused journey -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-gutter py-section-gap max-w-[600px] mx-auto w-full">
<!-- Step Indicator -->
<div class="mb-stack-lg flex items-center gap-2">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Paso 1 de 5</span>
</div>
<!-- Question Header -->
<header class="text-center mb-section-gap w-full">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg mb-stack-md text-ink-black tracking-tight">¿Cómo defines tu estilo diario?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Esta elección nos ayuda a curar prendas que realmente se adapten a tu ritmo de vida.</p>
</header>
<!-- Options Container: Large full-width blocks -->
<div class="w-full space-y-stack-md">
<!-- Option 1 -->
<button class="option-button w-full group flex items-center justify-between p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-none transition-all duration-200 hover:border-ink-black active:scale-[0.98]" onclick="selectOption(this)">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-ink-black">weekend</span>
<span class="font-body-lg text-body-lg">Muy casual</span>
</div>
<span class="material-symbols-outlined opacity-0 group-[.active]:opacity-100 text-ink-black">check_circle</span>
</button>
<!-- Option 2 -->
<button class="option-button w-full group flex items-center justify-between p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-none transition-all duration-200 hover:border-ink-black active:scale-[0.98]" onclick="selectOption(this)">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-ink-black">dry_cleaning</span>
<span class="font-body-lg text-body-lg">Casual</span>
</div>
<span class="material-symbols-outlined opacity-0 group-[.active]:opacity-100 text-ink-black">check_circle</span>
</button>
<!-- Option 3 -->
<button class="option-button w-full group flex items-center justify-between p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-none transition-all duration-200 hover:border-ink-black active:scale-[0.98]" onclick="selectOption(this)">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-ink-black">styler</span>
<span class="font-body-lg text-body-lg">Semi-formal</span>
</div>
<span class="material-symbols-outlined opacity-0 group-[.active]:opacity-100 text-ink-black">check_circle</span>
</button>
<!-- Option 4 -->
<button class="option-button w-full group flex items-center justify-between p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-none transition-all duration-200 hover:border-ink-black active:scale-[0.98]" onclick="selectOption(this)">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-ink-black">work</span>
<span class="font-body-lg text-body-lg">Formal</span>
</div>
<span class="material-symbols-outlined opacity-0 group-[.active]:opacity-100 text-ink-black">check_circle</span>
</button>
<!-- Option 5 -->
<button class="option-button w-full group flex items-center justify-between p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-none transition-all duration-200 hover:border-ink-black active:scale-[0.98]" onclick="selectOption(this)">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-ink-black">diamond</span>
<span class="font-body-lg text-body-lg">Muy formal</span>
</div>
<span class="material-symbols-outlined opacity-0 group-[.active]:opacity-100 text-ink-black">check_circle</span>
</button>
</div>
<!-- Action Footer -->
<footer class="mt-section-gap w-full flex flex-col gap-stack-md">
<button class="w-full py-stack-md bg-ink-black text-surface-bright font-label-caps text-label-caps uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed transition-all duration-300 hover:bg-on-primary-fixed-variant" disabled="" id="next-btn">
                Continuar
            </button>
<button class="w-full py-stack-sm text-on-surface-variant font-label-caps text-label-caps uppercase tracking-widest hover:text-ink-black transition-colors">
                Omitir por ahora
            </button>
</footer>
</main>
<!-- Visual Polish: Decorative Background Detail -->
<div class="fixed bottom-0 right-0 w-1/3 h-1/2 -z-10 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover grayscale" data-alt="A high-end editorial fashion photograph featuring a minimalist composition of a person in tailored garments against a neutral sand-toned background. The lighting is soft and diffused, highlighting the texture of the fabric. The overall mood is sophisticated, exclusive, and quiet, perfectly aligned with a luxury digital boutique aesthetic. High-contrast blacks and warm sand tones dominate the frame." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBql7UFr6cMUwmSolJHXB1NiQyHcoDw2t7r4zUX4K6KQFogLEmBnsYvXbrs1HEgfJI6n_yCec8b4KmC3s00kplAf5KWLpMY-08BXP9gprBsxPnL-16wiR7TuZturHLxm3sdMSLWmwYGMsu3h-PZwehh-FPnGUZprFeh8RYLG3kUEynW3u3Yg6aNoI3EK7PsT0nBGpGjhlTc0j7Lf6LOva6d-2fvyOfM_WHJUrHIowYveBor8v4TwjRvKNJNApHm3mCCpzO08CUQOA"/>
</div>
<script>
        function selectOption(element) {
            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.option-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked button
            element.classList.add('active');
            
            // Enable the continue button
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;

            // Micro-interaction: Subtle vibration if supported
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }
    </script>
</body></html>
